# ESP32 BLE-specific controller, heap, and bond-store settings.

# DLE and TX power are managed internally by the Espressif blob.

# Host privacy: ESP32-only override. Required for stable iOS pairing with the
# Espressif controller while ZephyrBLE still advertises the identity address.
CONFIG_BT_PRIVACY=y

# BLE thread stacks - ESP32 software BLE controller needs larger stacks.
CONFIG_BT_TX_PROCESSOR_STACK_SIZE=4096
CONFIG_BT_RX_STACK_SIZE=4096

# BLE TX buffers - the Espressif BLE controller blob bursts aggressively.
CONFIG_BT_BUF_ACL_TX_COUNT=12
CONFIG_BT_L2CAP_TX_BUF_COUNT=12
CONFIG_BT_CONN_TX_MAX=12
CONFIG_BT_BUF_EVT_RX_COUNT=14

# Restore link-layer encryption for the external Espressif BLE controller path.
CONFIG_ESP32_BT_CTLR_LE_SECURITY_ENABLE=y

# ESP32 BLE stack requires larger heap.
CONFIG_HEAP_MEM_POOL_SIZE=32768

# Bonds live in the dedicated storage_partition NVS region, isolated from /lfs.
CONFIG_SETTINGS_FILE=n
CONFIG_NVS=y
CONFIG_SETTINGS_NVS=y
