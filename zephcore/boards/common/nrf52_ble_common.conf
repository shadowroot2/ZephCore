# nRF52 BLE-specific controller and bond-store settings.

# Native USB companion uses the CDC ACM UART directly for the MeshCore
# protocol and its text CLI. The Zephyr console installs its own UART IRQ
# callback (the visible ">>" prompt), which otherwise consumes CLI input
# before ZephyrCompanionUSB can parse it. Repeaters do not include this
# companion-only configuration and retain their USB console.
CONFIG_CONSOLE=n
CONFIG_UART_CONSOLE=n

# TX power: +8 dBm (max for nRF52840 high-power radio front-end)
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Data Length Extension - controller-side max.
CONFIG_BT_CTLR_DATA_LENGTH_MAX=251

# Coded PHY - enable in nRF LL controller.
CONFIG_BT_CTLR_PHY_CODED=y

# Bonds live in the dedicated storage_partition NVS region, isolated from /lfs.
CONFIG_SETTINGS_FILE=n
CONFIG_NVS=y
CONFIG_SETTINGS_NVS=y

# Harmless when CONFIG_ASSERT=n; useful when controller asserts are enabled.
CONFIG_BT_CTLR_ASSERT_HANDLER=y
