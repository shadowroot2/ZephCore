# RP2040 Platform Configuration
#
# ZephCore support for Raspberry Pi Pico class boards. Repeater builds disable
# BLE via boards/common/repeater.conf and use USB CDC for the CLI.

CONFIG_BUILD_OUTPUT_UF2=y
CONFIG_USE_DT_CODE_PARTITION=y

CONFIG_USB_DEVICE_STACK_NEXT=y
CONFIG_CDC_ACM_SERIAL_INITIALIZE_AT_BOOT=n
CONFIG_UART_LINE_CTRL=y

# RP2040 has no hardware stack-protection unit in Zephyr.
CONFIG_HW_STACK_PROTECTION=n

# Pico repeater has no GNSS hardware.
CONFIG_GNSS=n
CONFIG_MODEM_MODULES=n
