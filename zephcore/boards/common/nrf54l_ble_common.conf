# nRF54L BLE-specific controller settings.

# TX power: +8 dBm (max - same open-source BLE controller as nRF52)
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Data Length Extension - controller-side max.
CONFIG_BT_CTLR_DATA_LENGTH_MAX=251

# Coded PHY - enable in nRF LL controller.
CONFIG_BT_CTLR_PHY_CODED=y

# Harmless when CONFIG_ASSERT=n; useful when controller asserts are enabled.
CONFIG_BT_CTLR_ASSERT_HANDLER=y
