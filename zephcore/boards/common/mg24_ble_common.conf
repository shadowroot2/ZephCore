# MG24 BLE-specific controller and heap settings.

# DLE and TX power are managed internally by the Silabs blob.

# BLE thread stacks - Silabs blob needs larger stacks.
CONFIG_BT_TX_PROCESSOR_STACK_SIZE=2048

# Controller assert handler - without this, a controller assert can freeze the CPU.
CONFIG_BT_CTLR_ASSERT_HANDLER=y

# Silabs BLE stack requires larger heap.
CONFIG_HEAP_MEM_POOL_SIZE=32768
