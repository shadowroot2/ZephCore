# Seeed Studio LoRa-E5 mini (STM32WLE5JC, integrated SX126x sub-GHz radio)
# Board-specific configuration.
#
# Hardware:
# - STM32WLE5JC: Cortex-M4 @ 48MHz (MSI), 256KB flash, 64KB SRAM
# - Integrated SX1262-class sub-GHz radio on the internal subghzspi bus
# - RF front-end: RFO_HP, +22 dBm; RF switch on PA4 (TX) / PA5 (RX)
#   (radio node configured in zephyr/dts/arm/seeed_studio/lora-e5.dtsi)
# - 32MHz TCXO (DIO3, 1.7V), 32.768kHz LSE
# - USART1 (PB6/PB7) -> onboard USB-UART bridge: console + CLI
# - No Bluetooth, no USB device (see boards/common/stm32wl_common.conf)
#
# Roles: repeater (USART CLI). Companion is serial-over-USART (no BLE).
# Flash via SWD/ST-Link: west flash  (OpenOCD runner, no UF2/DFU).

# Board identification
CONFIG_ZEPHCORE_BOARD_NAME="LoRa-E5 mini"

# Device Information Service model name (inert with BT off, kept for consistency)
CONFIG_BT_DIS_MODEL_NUMBER_STR="LoRa-E5 mini"

# TX power: +22 dBm RFO_HP (clamped to rfo-hp-max-power=22 in the DT radio node).
CONFIG_ZEPHCORE_DEFAULT_TX_POWER_DBM=22

# ========== Companion RAM capacity (64KB SRAM) ==========
# The companion build allocates static contacts[] + offline_queue[] arrays.
# The defaults (350 contacts ~66KB, 256-entry queue ~44KB) dwarf 64KB of SRAM,
# so cap them hard. These only allocate in the companion role; the repeater
# build ignores them. A serial companion on this constrained board is for
# modest contact lists.
CONFIG_ZEPHCORE_MAX_CONTACTS=24
CONFIG_ZEPHCORE_OFFLINE_QUEUE_SIZE=8
CONFIG_ZEPHCORE_MAX_CHANNELS=8
