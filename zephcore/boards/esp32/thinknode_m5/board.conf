# SPDX-License-Identifier: MIT
# Elecrow ThinkNode M5 — ESP32-S3 + SX1262
#
# Hardware mapping is taken from the official MeshCore
# variants/thinknode_m5 PlatformIO target.

CONFIG_ZEPHCORE_BOARD_NAME="ThinkNode M5"
CONFIG_BT_DIS_MODEL_NUMBER_STR="Elecrow ThinkNode M5"

# Official MeshCore uses LORA_TX_POWER=22 for this board.
CONFIG_ZEPHCORE_DEFAULT_TX_POWER_DBM=22

# This module does not boot reliably from the Zephyr/MCUboot image in QIO mode:
# the ROM loader resets before MCUboot prints anything. Keep DIO, but run the
# flash clock at 80 MHz like the working MeshCore target.
CONFIG_ESPTOOLPY_FLASHMODE_DIO=y
CONFIG_ESPTOOLPY_FLASHFREQ_80M=y

# ESP32-S3 BLE controller and SSD1681 framebuffer both allocate from k_malloc.
# Keep this at the ESP32 BLE-safe size; the M5 has no PSRAM to absorb a shortfall.
CONFIG_HEAP_MEM_POOL_SIZE=32768

# The companion default of 256 buffered offline messages consumes over 43 KiB
# of scarce internal DRAM. 100 remains ample while preserving room for BLE.
CONFIG_ZEPHCORE_OFFLINE_QUEUE_SIZE=100

# Keep a practical contact list while freeing enough DRAM for the BLE companion.
CONFIG_ZEPHCORE_MAX_CONTACTS=200

# M5 only needs the peripheral role for the companion BLE link. Avoid reserving
# controller DRAM for scanner/test roles on the 4 MB, no-PSRAM module.
# In the Zephyr ESP32 controller, LE_MASTER also gates connectable advertising,
# so it must stay enabled even though the app never acts as a BLE central.
CONFIG_ESP32_BT_CTLR_LE_MAX_CONN=1
CONFIG_ESP32_BT_CTLR_LE_MAX_ACT=2
CONFIG_ESP32_BT_CTLR_DTM_ENABLE=n
CONFIG_ESP32_BT_CTLR_LE_MASTER=y
CONFIG_ESP32_BT_CTLR_LE_SCAN=n
# MeshCore does not force ESP32 BLE TX power on M5. Zephyr's ESP32 choices do
# not expose exactly +5 dBm, so use the closest supported value above it.
CONFIG_BT_CTLR_TX_PWR_PLUS_6=y
CONFIG_BT_CTLR_ASSERT_HANDLER=y
CONFIG_ZEPHCORE_BLE_BOOT_DIAG=y

# Match the working MeshCore ESP32 BLE profile: advertise only the secure NUS
# service used by the companion app. Extra DIS / Service Changed handles are
# useful on nRF boards but cost RAM and are absent from the M5 MeshCore build.
CONFIG_BT_DIS=n
CONFIG_BT_GATT_SERVICE_CHANGED=n

# GPIO19/20 are used by the GPS UART on M5. Keep the native USB Serial/JTAG
# block disabled so it does not keep ownership of those pads.
CONFIG_ESP_USB_SERIAL_JTAG_ENABLED=n

# USB-C is connected through the UART0 bridge, not the ESP32-S3 native USB
# controller.  Make the companion transport and human text CLI available on
# that bridge while retaining BLE.  The transport owns UART0 exclusively.
CONFIG_ZEPHCORE_COMPANION_USB=n
CONFIG_ZEPHCORE_COMPANION_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y
# The UART0 bridge works with polling I/O but can fail to signal RX IRQs.
CONFIG_ZEPHCORE_COMPANION_SERIAL_POLLING=y
CONFIG_CONSOLE=n
CONFIG_UART_CONSOLE=n
CONFIG_SHELL=n

# 200x200 E-Ink is easier to read with the larger CFB font.
CONFIG_ZEPHCORE_DISPLAY_LARGE_FONT=y
CONFIG_ZEPHCORE_UI_DISPLAY_AUTO_OFF_MS=10000
CONFIG_ZEPHCORE_UI_TIMEZONE_OFFSET_MINUTES=300

# Same UX as ThinkNode M1: e-paper redraw + human reaction does not fit the
# global 500 ms destructive-action confirmation window.
CONFIG_ZEPHCORE_UI_CONFIRM_WINDOW_MS=3000

# The M5 is a battery board with a working ADC divider.
CONFIG_ZEPHCORE_AUTO_SHUTDOWN_MILLIVOLTS=3250

# Decode GSV so the GPS screen can show satellites visible to the receiver,
# not only the subset currently used for a navigation fix.
CONFIG_GNSS_SATELLITES=y
CONFIG_GNSS_LUATOS_AIR530Z_SATELLITES_COUNT=32
