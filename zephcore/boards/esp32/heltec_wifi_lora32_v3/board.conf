# Heltec WiFi LoRa 32 V3 — ESP32-S3 + SX1262
#
# Hardware:
#   ESP32-S3 (8MB flash, no PSRAM)
#   SX1262 on SPI2 (direct output, no PA)
#   SSD1306 128x64 OLED on I2C0
#   User button on GPIO0
#
# Include order: prj.conf → zephcore_common.conf → esp32_common.conf → board.conf

# Board identification
CONFIG_ZEPHCORE_BOARD_NAME="Heltec V3"
CONFIG_BT_DIS_MODEL_NUMBER_STR="Heltec WiFi LoRa 32 V3"

# Flash size — 8MB (override esp32_common.conf 4MB default)
CONFIG_ESPTOOLPY_FLASHSIZE_8MB=y

# Heltec V3 companion uses BLE only.
CONFIG_WIFI=n
CONFIG_NET_L2_WIFI_MGMT=n

# USB-C is a CP2102 bridge to UART0.  The Companion USB/CLI backend owns that
# UART, so Zephyr's console must stay off it; otherwise both install UART IRQ
# callbacks and typed CLI commands are never delivered to CompanionMesh.
CONFIG_CONSOLE=n
CONFIG_UART_CONSOLE=n

# Lower ESP32 BLE TX power to reduce heat and battery load. Zephyr's ESP32
# choices do not expose exactly +5 dBm, so use the closest supported value.
CONFIG_BT_CTLR_TX_PWR_PLUS_6=y

# Single-button board: ENTER comes from the input-longpress filter (~1s hold).
# Two long holds to confirm shutdown/DFU/offgrid cannot fit the default 500ms
# window, so widen it to 3000ms like the other one-button boards.
CONFIG_ZEPHCORE_UI_CONFIRM_WINDOW_MS=3000

# Heltec V3 has a working battery ADC in the board overlay. Enable the same
# low-battery cutoff used by the companion builds that need LiPo protection.
CONFIG_ZEPHCORE_AUTO_SHUTDOWN_MILLIVOLTS=3250
