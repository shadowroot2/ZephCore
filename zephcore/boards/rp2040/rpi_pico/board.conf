# Raspberry Pi Pico W + SX1262 repeater
#
# Pinout matches MeshCore's PicoW_repeater-v1.14.1-467959c variant.

CONFIG_ZEPHCORE_BOARD_NAME="PicoW Waveshare"

CONFIG_ZEPHCORE_RADIO_NATIVE=y
CONFIG_ZEPHCORE_DEFAULT_TX_POWER_DBM=22
CONFIG_ZEPHCORE_MAX_TX_POWER_DBM=22

# "start dfu" reboots through the RP2040 ROM USB mass-storage bootloader.
CONFIG_RETAINED_MEM=y
CONFIG_RETENTION=y
CONFIG_RETENTION_BOOT_MODE=y
